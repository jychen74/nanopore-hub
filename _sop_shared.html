<!-- _sop_shared.html：所有 SOP 頁面共用的 CSS + JS 機制 -->
<!-- 在每個 sop_*.qmd 底部加入：{{< include _sop_shared.html >}} -->
<style>
.sop-step {
  display: flex; gap: 12px; padding: 10px 14px;
  border-bottom: 1px solid #f1f5f9; cursor: pointer;
  border-radius: 6px; transition: background 0.15s;
  align-items: flex-start;
}
.sop-step:hover { background: #f8fafc; }
.sop-step.checked { background: #f0fdf4; opacity: 0.65; }
.step-cb { font-size: 16px; flex-shrink: 0; line-height: 1.5; user-select: none; }
.step-num { font-weight: 700; color: #2d4a7a; margin-right: 6px; }
.step-time {
  font-size: 10px; background: #dbeafe; color: #1e40af;
  border-radius: 4px; padding: 2px 6px; margin-left: 8px;
  font-family: monospace; white-space: nowrap;
}
.step-note { font-size: 11px; color: #64748b; margin-top: 4px; padding-left: 20px; }
.step-warn {
  font-size: 11px; color: #92400e; background: #fef3c7;
  border-radius: 4px; padding: 4px 8px; margin-top: 4px;
}
</style>
<script>
const _checkedSteps = {};
function renderSteps(containerId, steps, globalOffset) {
  const el = document.getElementById(containerId);
  if (!el) return;
  el.innerHTML = steps.map((s, i) => {
    const num = (globalOffset || 0) + i + 1;
    const time = s.time ? `<span class="step-time">${s.time}</span>` : '';
    const note = s.note ? `<div class="step-note">${s.note}</div>` : '';
    const warn = s.warn ? `<div class="step-warn">⚠️ ${s.warn}</div>` : '';
    return `<div class="sop-step" id="step-${s.id}" onclick="toggleStep('${s.id}')">
      <span class="step-cb" id="cb-${s.id}">⬜</span>
      <div><span class="step-num">${num}.</span>${s.text}${time}${note}${warn}</div>
    </div>`;
  }).join('');
}
function toggleStep(id) {
  _checkedSteps[id] = !_checkedSteps[id];
  document.getElementById(`step-${id}`).classList.toggle('checked', _checkedSteps[id]);
  document.getElementById(`cb-${id}`).textContent = _checkedSteps[id] ? '✅' : '⬜';
}
</script>
